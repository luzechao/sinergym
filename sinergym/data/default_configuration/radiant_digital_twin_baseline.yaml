  # LOW TEMP RADIANT CONST FLOW_P1_ASEO2-VESTIDOR:
  #   variable_name: flow_rate_f1_bathroom-dressing
  #   element_type: Constant Flow Low Temp Radiant
  #   value_type: Water Mass Flow Rate
  
  # HW Temperature Schedule_45C:
  #   variable_name: water_temperature
  #   element_type: Schedule:Year
  #   value_type: Schedule Value

# ---------------------------------------------------------------------------- #
#                   DYNAMIC CONTEXT CONFIGURABLE IN REAL-TIME                  #
# ---------------------------------------------------------------------------- #
context: 

  Setpoint Schedule PB_Salon:
    variable_name: heating_setpoint_f0_living-kitchen
    element_type: Schedule:Compact
    value_type: Schedule Value
  Setpoint Schedule PB_Aseo-Vestibulo:
    variable_name: heating_setpoint_f0_bathroom-lobby
    element_type: Schedule:Compact
    value_type: Schedule Value
  Setpoint Schedule P1_Dormitorio1:
    variable_name: heating_setpoint_f1_bedroom1
    element_type: Schedule:Compact
    value_type: Schedule Value
  Setpoint Schedule P1_Dormitorio2:
    variable_name: heating_setpoint_f1_bedroom2
    element_type: Schedule:Compact
    value_type: Schedule Value
  Setpoint Schedule P1_Dormitorio3:
    variable_name: heating_setpoint_f1_bedroom3
    element_type: Schedule:Compact
    value_type: Schedule Value
  Setpoint Schedule P1_Aseo-Pasillo:
    variable_name: heating_setpoint_f1_bathroom-corridor
    element_type: Schedule:Compact
    value_type: Schedule Value
  Setpoint Schedule P1_Aseo2-Vestidor:
    variable_name: heating_setpoint_f1_bathroom-dressing
    element_type: Schedule:Compact
    value_type: Schedule Value

initial_context:
  - 22.0
  - 22.0
  - 22.0
  - 22.0
  - 22.0
  - 22.0
  - 22.0
# ---------------------------------------------------------------------------- #
#                                 ACTIONS SPACE                                #
# ---------------------------------------------------------------------------- #
action_space: gym.spaces.Box(low=np.array([], dtype=np.float32),
  high=np.array([], dtype=np.float32),
  shape=(0,), dtype=np.float32)

only_discrete: false

# ---------------------------------------------------------------------------- #
#                                REWARD FUNCTION                               #
# ---------------------------------------------------------------------------- #
reward: sinergym.utils.rewards:MultiZoneRewardV2

reward_kwargs:
  comfort_threshold: 1
  energy_variables:
    - heat_source_electricity_rate
  energy_weight: 0.5
  lambda_energy: 0.001
  lambda_temperature: 1
  temperature_and_setpoints_conf:
    air_temperature_f0_living-kitchen: heating_setpoint_f0_living-kitchen
    air_temperature_f0_bathroom-lobby: heating_setpoint_f0_bathroom-lobby
    air_temperature_f1_bedroom1: heating_setpoint_f1_bedroom1
    air_temperature_f1_bedroom2: heating_setpoint_f1_bedroom2
    air_temperature_f1_bedroom3: heating_setpoint_f1_bedroom3
    air_temperature_f1_bathroom-corridor: heating_setpoint_f1_bathroom-corridor
    air_temperature_f1_bathroom-dressing: heating_setpoint_f1_bathroom-dressing